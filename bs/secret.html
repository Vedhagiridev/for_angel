<!DOCTYPE html>
<html>

<head>

<title>Secret ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

/* SECRET PASSWORD SCREEN */

.secret-lock{

    position:fixed;
    width:100%;
    height:100vh;
    background:rgba(139, 67, 34, 0.92);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lock-box{

    width:350px;
    padding:40px;
    border-radius:25px;

    background:rgba(15, 7, 1, 0.08);

    backdrop-filter:blur(15px);

    text-align:center;

    border:1px solid rgba(255,255,255,0.1);
}

.lock-box h1{

    font-family:'Dancing Script',cursive;
    font-size:3rem;
    margin-bottom:20px;
}

.lock-box input{

    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:20px;
    outline:none;
}

.lock-box button{

    margin-top:25px;
    padding:14px 35px;
    border:none;
    border-radius:40px;

    background:
    linear-gradient(to right,#ff4b91,#ff7676);

    color:rgb(200, 174, 174);

    cursor:pointer;

    transition:0.4s;
}

.lock-box button:hover{

    transform:scale(1.07);
}

#error{

    color:#ff7676;
    margin-top:15px;
}

/* CAKE */

.cake{

    font-size:5rem;
    margin-top:25px;
    animation:bounce 2s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }
}

/* STICKERS */

.sticker{

    position:absolute;
    font-size:2.5rem;
    animation:floatSticker 6s linear infinite;
}

@keyframes floatSticker{

    from{
        transform:translateY(100vh) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(-10vh) rotate(360deg);
        opacity:0;
    }
}

</style>

</head>

<body>

<!-- PASSWORD SCREEN -->

<div class="secret-lock" id="lockScreen">

    <div class="lock-box">

        <h1>
        Secret Access 🔐
        </h1>

        <p>
        Enter the special word
        </p>

        <input type="password" id="secretPassword">

        <button onclick="unlockSecret()">
        Unlock ✨
        </button>

        <p id="error"></p>

       
    </div>

</div>

<!-- BACKGROUND -->

<video autoplay muted loop class="bg-video">

<source src="assets/bg.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="hearts"></div>

<!-- STICKERS -->

<div id="stickers"></div>

<!-- SECRET CONTENT -->

<section class="hero" id="secretContent" style="display:none;">

<div class="hero-content">

<h1>
You Found The Secret ❤️
</h1>

<p>

You are one of the rare people who made life feel happier,
lighter, and more beautiful.

</p>



<a href="final.html" class="next-btn">

Continue ✨

</a>

</div>

</section>

<script src="script.js"></script>

<script>

/* PASSWORD */

function unlockSecret(){

    const pass =
    document.getElementById("secretPassword").value;

    const correctPassword = "im ju gyeong";

    if(pass === correctPassword){

        document.getElementById("lockScreen")
        .style.display = "none";

        document.getElementById("secretContent")
        .style.display = "flex";

    }else{

        document.getElementById("error")
        .innerHTML = "Wrong password ❤️";
    }
}

/* STICKERS */

const stickers = [
"🎉",
"🎂",
"✨",
"💖",
"🌸",
"🎈",
"🧸",
"🍰",
"💫",
"💕"
];

function createSticker(){

    const sticker =
    document.createElement("div");

    sticker.classList.add("sticker");

    sticker.innerHTML =
    stickers[Math.floor(Math.random()*stickers.length)];

    sticker.style.left =
    Math.random() * 100 + "vw";

    sticker.style.animationDuration =
    Math.random() * 3 + 4 + "s";

    sticker.style.fontSize =
    Math.random() * 25 + 20 + "px";

    document.getElementById("stickers")
    .appendChild(sticker);

    setTimeout(()=>{

        sticker.remove();

    },7000);
}

setInterval(createSticker,400);

</script>

</body>
</html>
